name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Checkout tdlib
        uses: actions/checkout@v4
        with:
          repository: tdlib/td
          path: tdlib
          depth: 1

      - name: Install gperf
        run: sudo apt-get install gperf libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Configure tdlib
        run: |
          cmake -B build -S tdlib \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=ON \
            -DCMAKE_DISABLE_FIND_PACKAGE_ZLIB=ON

      - name: Build tdlib (Linux)
        run: cmake --build build --parallel --config Release
        if: runner.os == 'Linux'

      - name: Build tdlib (macOS)
        run: cmake --build build --parallel --config Release
        if: runner.os == 'macOS'

      - name: Build tdlib (Windows)
        run: cmake --build build --parallel --config Release
        if: runner.os == 'Windows'

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Telegram Tauri v__VERSION__'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false