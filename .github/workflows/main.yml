name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TD_LIB_VERSION: 'v1.8.61'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  build-tauri:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-action@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            cmake \
            make \
            gcc \
            g++

      - name: Download tdlib
        run: |
          curl -sL "https://github.com/tdlib/td/releases/download/${{ env.TD_LIB_VERSION }}/tdlib-${{ env.TD_LIB_VERSION }}-Linux.tar.gz" | tar -xz
          ls -la tdlib/

      - name: Set build environment
        run: |
          echo "TDLIB_DIR=$(pwd)/tdlib" >> $GITHUB_ENV
          echo "TD_INCLUDE_DIR=$(pwd)/tdlib/include" >> $GITHUB_ENV
          echo "TD_LIB_DIR=$(pwd)/tdlib/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(pwd)/tdlib/lib/pkgconfig" >> $GITHUB_ENV
          ls "${{ env.TD_INCLUDE_DIR }}"

      - name: Update Cargo.toml for tdlib-sys
        run: |
          cat >> src-tauri/Cargo.toml << 'EOF'

[target.x86_64-unknown-linux-gnu.dependencies]
tdlib-sys = { version = "0.2", features = ["pkg-config"] }
EOF

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Telegram Desktop v__VERSION__'
          releaseBody: |
            Telegram Desktop client built with Tauri 2, React, and tdlib.
            
            ## Features
            - Telegram messaging
            - Cross-platform (Windows, macOS, Linux)
            
            ## Requirements
            You need Telegram API credentials from https://my.telegram.org
          releaseDraft: true
          prerelease: false

  build-windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-action@stable

      - name: Download tdlib for Windows
        run: |
          Invoke-WebRequest -Uri "https://github.com/tdlib/td/releases/download/${{ env.TD_LIB_VERSION }}/tdlib-${{ env.TD_LIB_VERSION }}-Windows.zip" -OutFile "tdlib.zip"
          Expand-Archive -Path "tdlib.zip" -DestinationPath "tdlib" -Force
          Get-ChildItem -Path "tdlib"

      - name: Set environment
        run: |
          echo "TDLIB_DIR=$((Get-Location).Path)/tdlib" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "TD_INCLUDE_DIR=$((Get-Location).Path)/tdlib/include" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "TD_LIB_DIR=$((Get-Location).Path)/tdlib/lib" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Update Cargo.toml for Windows
        run: |
          "@`n[target.x86_64-pc-windows-msvc.dependencies]`n" | Out-File -FilePath src-tauri/Cargo.toml -Append
          "@`ntdblib-sys = { version = `"0.2`", features = [`"pkg-config`"] }`n" | Out-File -FilePath src-tauri/Cargo.toml -Append

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Telegram Desktop v__VERSION__'
          releaseBody: 'Telegram Desktop client'
          releaseDraft: true
          prerelease: false

  build-macos:
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-action@stable
        with:
          targets: aarch64-apple-darwin

      - name: Download tdlib for macOS
        run: |
          curl -sL "https://github.com/tdlib/td/releases/download/${{ env.TD_LIB_VERSION }}/tdlib-${{ env.TD_LIB_VERSION }}-macOS.tar.gz" | tar -xz
          ls -la tdlib/

      - name: Set environment
        run: |
          echo "TDLIB_DIR=$(pwd)/tdlib" >> $GITHUB_ENV
          echo "TD_INCLUDE_DIR=$(pwd)/tdlib/include" >> $GITHUB_ENV
          echo "TD_LIB_DIR=$(pwd)/tdlib/lib" >> $GITHUB_ENV

      - name: Update Cargo.toml for macOS
        run: |
          cat >> src-tauri/Cargo.toml << 'EOF'

[target.aarch64-apple-darwin.dependencies]
tdlib-sys = { version = "0.2", features = ["pkg-config"] }
EOF

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Telegram Desktop v__VERSION__'
          releaseBody: 'Telegram Desktop client'
          releaseDraft: true
          prerelease: false