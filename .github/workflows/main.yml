name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TD_LIB_VERSION: 'v1.8.61'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  build-linux:
    needs: check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            cmake \
            make \
            gcc \
            g++

      - name: Download tdlib
        run: |
          curl -sL "https://github.com/tdlib/td/releases/download/${{ env.TD_LIB_VERSION }}/tdlib-${{ env.TD_LIB_VERSION }}-Linux.tar.gz" -o tdlib.tar.gz
          tar -xzf tdlib.tar.gz
          ls -la tdlib/

      - name: Set build environment
        run: |
          echo "TDLIB_DIR=$(pwd)/tdlib" >> $GITHUB_ENV

      - name: Add tdlib-sys to Cargo.toml
        run: |
          echo '' >> src-tauri/Cargo.toml
          echo '[target.x86_64-unknown-linux-gnu.dependencies]' >> src-tauri/Cargo.toml
          echo 'tdlib-sys = { version = "0.2", features = ["pkg-config"] }' >> src-tauri/Cargo.toml

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_CONFIG_PATH: $(pwd)/tdlib/lib/pkgconfig
        with:
          tagName: v__VERSION__
          releaseName: 'Telegram Desktop v__VERSION__'
          releaseBody: 'Telegram Desktop client built with Tauri 2, React, and tdlib.'
          releaseDraft: true
          prerelease: false

  build-windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable

      - name: Download tdlib for Windows
        run: |
          Invoke-WebRequest -Uri "https://github.com/tdlib/td/releases/download/${{ env.TD_LIB_VERSION }}/tdlib-${{ env.TD_LIB_VERSION }}-Windows.zip" -OutFile "tdlib.zip"
          Expand-Archive -Path "tdlib.zip" -DestinationPath "tdlib" -Force

      - name: Set environment
        run: |
          echo "TDLIB_DIR=$((Get-Location).Path)/tdlib" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Add tdlib-sys to Cargo.toml
        run: |
          Add-Content -Path src-tauri/Cargo.toml -Value ""
          Add-Content -Path src-tauri/Cargo.toml -Value "[target.x86_64-pc-windows-msvc.dependencies]"
          Add-Content -Path src-tauri/Cargo.toml -Value 'tdlib-sys = { version = "0.2", features = ["pkg-config"] }'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Telegram Desktop v__VERSION__'
          releaseBody: 'Telegram Desktop client'
          releaseDraft: true
          prerelease: false

  build-macos:
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin

      - name: Download tdlib for macOS
        run: |
          curl -sL "https://github.com/tdlib/td/releases/download/${{ env.TD_LIB_VERSION }}/tdlib-${{ env.TD_LIB_VERSION }}-macOS.tar.gz" -o tdlib.tar.gz
          tar -xzf tdlib.tar.gz

      - name: Set environment
        run: |
          echo "TDLIB_DIR=$(pwd)/tdlib" >> $GITHUB_ENV

      - name: Add tdlib-sys to Cargo.toml
        run: |
          echo '' >> src-tauri/Cargo.toml
          echo '[target.aarch64-apple-darwin.dependencies]' >> src-tauri/Cargo.toml
          echo 'tdlib-sys = { version = "0.2", features = ["pkg-config"] }' >> src-tauri/Cargo.toml

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Telegram Desktop v__VERSION__'
          releaseBody: 'Telegram Desktop client'
          releaseDraft: true
          prerelease: false