name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TD_LIB_VERSION: 'v1.8.0'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  build-windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable

      - name: Download tdlib for Windows
        run: |
          Invoke-WebRequest -Uri "https://github.com/tdlib/td/releases/download/${{ env.TD_LIB_VERSION }}/tdlib-${{ env.TD_LIB_VERSION }}-Windows.zip" -OutFile "tdlib.zip"
          Expand-Archive -Path "tdlib.zip" -DestinationPath "tdlib" -Force

      - name: Set environment
        run: |
          $tdlibDir = "$((Get-Location).Path)/tdlib"
          echo "TDLIB_DIR=$tdlibDir" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "TD_INCLUDE_DIR=$tdlibDir/include" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "TD_LIB_DIR=$tdlibDir/lib" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "LIB=$tdlibDir/lib" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Telegram Desktop v__VERSION__'
          releaseBody: 'Telegram Desktop client built with Tauri 2, React, and tdlib.'
          releaseDraft: true
          prerelease: false